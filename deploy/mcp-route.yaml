apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kubectl-debug-queries-mcp-server
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: kubectl-debug-queries-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: kubectl-debug-queries
spec:
  to:
    kind: Service
    name: kubectl-debug-queries-mcp-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
